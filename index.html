<!doctype html><html lang="uk"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#0B1220"/><link rel="manifest" href="./manifest.json"/><link rel="icon" href="./icon.svg" type="image/svg+xml"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="StepMap"/><title>StepMap</title><style>
:root{--bg:#0b1220;--card:rgba(17,24,39,.86);--card2:rgba(17,24,39,.68);--text:#e5e7eb;--muted:#9ca3af;--border:rgba(255,255,255,.12);--accent:#22c55e;--accent2:#60a5fa;}
@media (prefers-color-scheme: light){:root{--bg:#f8fafc;--card:rgba(255,255,255,.86);--card2:rgba(255,255,255,.62);--text:#0b1220;--muted:#4b5563;--border:rgba(2,6,23,.12);--accent:#16a34a;--accent2:#2563eb;}}
*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif}
#mapWrap{position:fixed;inset:0}#map{position:absolute;inset:0}
.topBar{position:fixed;top:0;left:0;right:0;z-index:50;padding:10px 12px;display:grid;grid-template-columns:1fr auto;gap:10px;pointer-events:none}
.tabs{pointer-events:auto;background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:6px;backdrop-filter:blur(10px);display:grid;grid-template-columns:1fr 1fr;gap:6px}
.tabBtn{appearance:none;border:1px solid transparent;background:transparent;color:var(--text);border-radius:12px;padding:12px 10px;font-size:16px;font-weight:850;letter-spacing:.1px;text-align:center}
.tabBtn.active{border-color:rgba(255,255,255,.18);background:linear-gradient(135deg,rgba(96,165,250,.28),rgba(34,197,94,.22))}
.gearBtn{pointer-events:auto;appearance:none;border:1px solid var(--border);background:var(--card2);color:var(--text);border-radius:16px;padding:12px 14px;font-size:18px;font-weight:900;backdrop-filter:blur(10px)}
.overlayCard{position:fixed;left:12px;right:12px;z-index:60;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;backdrop-filter:blur(10px)}
#tab1Overlay,#tab2Overlay{top:76px}.hidden{display:none!important}
.counterMain{font-size:20px;font-weight:950;letter-spacing:.2px;line-height:1.2}
.counterSub{margin-top:6px;font-size:13px;color:var(--muted);line-height:1.35}
.counterSubStrong{margin-top:4px;font-size:13px;color:var(--muted)}
.progressWrap{margin-top:12px}.progressLabel{display:flex;justify-content:space-between;gap:10px;font-size:13px;color:var(--muted);margin-bottom:8px}
.progressBar{height:12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);overflow:hidden}
@media (prefers-color-scheme: light){.progressBar{background:rgba(2,6,23,.06);border:1px solid rgba(2,6,23,.10)}}
.progressFill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:999px;transition:width 200ms ease}
.field{display:grid;gap:6px;margin-bottom:10px}label{font-size:13px;color:var(--muted);font-weight:800}
input{width:100%;font-size:18px;padding:12px;border-radius:14px;background:transparent;color:var(--text);border:1px solid var(--border);outline:none}
input:focus{border-color:rgba(34,197,94,.65)}
.bottomPanel{position:fixed;left:0;right:0;bottom:0;z-index:70;padding:12px 12px 18px;pointer-events:none;background:linear-gradient(to top,rgba(0,0,0,.35),rgba(0,0,0,0))}
.bottomInner{pointer-events:auto}.btnRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{appearance:none;width:100%;border:0;border-radius:16px;padding:14px;font-size:18px;font-weight:900;color:#071018;background:linear-gradient(135deg,var(--accent2),var(--accent));box-shadow:0 12px 28px rgba(0,0,0,.25)}
button:disabled{opacity:.6;box-shadow:none;cursor:not-allowed}
.ghostBtn{color:var(--text);background:transparent;border:1px solid var(--border);box-shadow:none}
.drawerOverlay{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.35);display:none}
.drawerOverlay.open{display:block}
.drawer{position:absolute;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--card);border-left:1px solid var(--border);padding:14px;transform:translateX(10px);opacity:0;transition:transform 200ms ease,opacity 200ms ease;backdrop-filter:blur(10px)}
.drawerOverlay.open .drawer{transform:translateX(0);opacity:1}
.drawerHeader{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.drawerTitle{font-size:16px;font-weight:950}
.closeBtn{appearance:none;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:14px;padding:10px 12px;font-size:14px;font-weight:950}
.drawerHelp{margin-top:8px;font-size:12.5px;color:var(--muted);line-height:1.45}
#statusToast{position:fixed;left:12px;right:12px;top:140px;z-index:80;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 12px;display:none}
#statusToast.show{display:block}
</style></head><body>
<div id="mapWrap"><div id="map" aria-label="Карта"></div></div>
<div class="topBar">
  <div class="tabs" role="tablist" aria-label="StepMap tabs">
    <button id="tab1Btn" class="tabBtn active" type="button" aria-selected="true">🗺️ Мій маршрут</button>
    <button id="tab2Btn" class="tabBtn" type="button" aria-selected="false">🎲 Запропонувати маршрут</button>
  </div>
  <button id="gearBtn" class="gearBtn" type="button" title="Налаштування">⚙️</button>
</div>
<div id="statusToast" aria-live="polite"></div>

<div id="tab1Overlay" class="overlayCard">
  <div class="counterMain" id="tab1CounterMain">Натискай на карту</div>
  <div class="counterSub" id="tab1CounterSub">Перший клік — старт, наступні — точки маршруту.</div>
  <div class="progressWrap">
    <div class="progressLabel"><span>Прогрес</span><span id="tab1ProgressLabel">0 / 10 000</span></div>
    <div class="progressBar" aria-label="Прогрес до цілі"><div class="progressFill" id="tab1ProgressFill"></div></div>
  </div>
</div>

<div id="tab2Overlay" class="overlayCard hidden">
  <div class="field"><label for="stepsToday">Вже пройдено кроків сьогодні</label><input id="stepsToday" inputmode="numeric" type="number" min="0" step="1" placeholder="0"/></div>
  <div class="counterSub" id="tab2Remaining">Лишилось: —</div>
  <div class="counterSub" id="tab2Result" style="margin-top:10px">Результат: —</div>
</div>

<div class="bottomPanel"><div class="bottomInner">
  <div id="bottomTab1" class="btnRow">
    <button id="undoBtn" class="ghostBtn" type="button" disabled>Скасувати останню точку</button>
    <button id="clearTab1Btn" class="ghostBtn" type="button" disabled>Очистити маршрут</button>
  </div>
  <div id="bottomTab2" class="btnRow hidden" style="margin-top:12px">
    <button id="buildBtn" type="button" disabled>Побудувати маршрут</button>
    <button id="clearTab2Btn" class="ghostBtn" type="button">Очистити</button>
  </div>
</div></div>

<div id="drawerOverlay" class="drawerOverlay" role="dialog" aria-modal="true" aria-label="Налаштування">
  <div class="drawer">
    <div class="drawerHeader"><div class="drawerTitle">Налаштування</div><button id="closeDrawerBtn" class="closeBtn" type="button">Закрити</button></div>
    <div class="field"><label for="heightCm">Зріст (см)</label><input id="heightCm" inputmode="numeric" type="number" min="80" max="250" step="0.1" placeholder="Напр.: 175"/></div>
    <div class="field"><label for="targetSteps">Денна ціль кроків</label><input id="targetSteps" inputmode="numeric" type="number" min="100" step="100" placeholder="10000"/></div>
    <div class="counterSubStrong" id="drawerStepInfo">Крок = — м</div>
    <div class="drawerHelp">Працює на Directions API (WALKING). Для маршруту потрібні геолокація та Google Maps JavaScript API.</div>
  </div>
</div>

<script>
  const GOOGLE_MAPS_API_KEY = "AIzaSyCISXGRM0MRgKQLm-6TIKPolHUMJakR_vE";
  const LS = { heightCm: "stepmap:heightCm", targetSteps: "stepmap:targetSteps" };
  const fmtUk = new Intl.NumberFormat("uk-UA");

  const els = {
    tab1Btn: document.getElementById("tab1Btn"), tab2Btn: document.getElementById("tab2Btn"),
    tab1Overlay: document.getElementById("tab1Overlay"), tab2Overlay: document.getElementById("tab2Overlay"),
    bottomTab1: document.getElementById("bottomTab1"), bottomTab2: document.getElementById("bottomTab2"),
    undoBtn: document.getElementById("undoBtn"), clearTab1Btn: document.getElementById("clearTab1Btn"),
    buildBtn: document.getElementById("buildBtn"), clearTab2Btn: document.getElementById("clearTab2Btn"),
    tab1CounterMain: document.getElementById("tab1CounterMain"), tab1CounterSub: document.getElementById("tab1CounterSub"),
    tab1ProgressFill: document.getElementById("tab1ProgressFill"), tab1ProgressLabel: document.getElementById("tab1ProgressLabel"),
    stepsToday: document.getElementById("stepsToday"), tab2Remaining: document.getElementById("tab2Remaining"), tab2Result: document.getElementById("tab2Result"),
    gearBtn: document.getElementById("gearBtn"), drawerOverlay: document.getElementById("drawerOverlay"), closeDrawerBtn: document.getElementById("closeDrawerBtn"),
    heightCm: document.getElementById("heightCm"), targetSteps: document.getElementById("targetSteps"), drawerStepInfo: document.getElementById("drawerStepInfo"),
    statusToast: document.getElementById("statusToast"),
  };

  let map = null, directionsService = null, startLatLng = null;
  let activeTab = "tab1";
  let tab1Building = false, tab2Building = false;
  let tab1Points = [], tab1Markers = [], tab1Segments = []; // {polyline,distanceMeters}
  let tab2Polylines = [];

  const setStatus = (msg) => { els.statusToast.textContent = msg || ""; els.statusToast.classList.toggle("show", !!msg); };

  const stepMetersFromHeightCm = (h) => (h * 0.414) / 100;
  const getHeightCm = () => { const v = Number(els.heightCm.value); return Number.isFinite(v) && v > 0 ? v : null; };
  const getTargetSteps = () => { const v = Number(els.targetSteps.value); return Number.isFinite(v) && v >= 0 ? v : 10000; };
  const getStepMeters = () => { const h = getHeightCm(); if (!h) return null; const m = stepMetersFromHeightCm(h); return m > 0 ? m : null; };

  function saveSettings() {
    if (els.heightCm.value !== "") localStorage.setItem(LS.heightCm, els.heightCm.value);
    else localStorage.removeItem(LS.heightCm);
    if (els.targetSteps.value !== "") localStorage.setItem(LS.targetSteps, els.targetSteps.value);
  }

  function updateDrawerStepInfo() {
    const h = getHeightCm();
    if (!h) { els.drawerStepInfo.textContent = "Крок = — м"; return; }
    const m = stepMetersFromHeightCm(h);
    els.drawerStepInfo.textContent = `Крок = ≈ ${fmtUk.format(Math.round(m*100)/100)} м`;
  }

  function loadSettings() {
    const hRaw = localStorage.getItem(LS.heightCm);
    const tRaw = localStorage.getItem(LS.targetSteps);
    if (hRaw && Number.isFinite(Number(hRaw))) els.heightCm.value = String(hRaw);
    els.targetSteps.value = (tRaw && Number.isFinite(Number(tRaw))) ? String(tRaw) : "10000";
    updateDrawerStepInfo();
    updateTab1UI();
    updateTab2RemainingUI();
  }

  function clearTab1() {
    for (const m of tab1Markers) m.setMap(null);
    for (const s of tab1Segments) if (s.polyline) s.polyline.setMap(null);
    tab1Points = []; tab1Markers = []; tab1Segments = [];
    setStatus("");
    updateTab1UI();
  }

  function clearTab2() {
    for (const p of tab2Polylines) p.setMap(null);
    tab2Polylines = [];
    els.tab2Result.textContent = "Результат: —";
    setStatus("");
    updateTab2RemainingUI();
  }

  function setActiveTab(tabId) {
    activeTab = tabId;
    els.tab1Btn.classList.toggle("active", tabId === "tab1");
    els.tab2Btn.classList.toggle("active", tabId === "tab2");
    els.tab1Btn.setAttribute("aria-selected", tabId === "tab1" ? "true" : "false");
    els.tab2Btn.setAttribute("aria-selected", tabId === "tab2" ? "true" : "false");
    els.tab1Overlay.classList.toggle("hidden", tabId !== "tab1");
    els.tab2Overlay.classList.toggle("hidden", tabId !== "tab2");
    els.bottomTab1.classList.toggle("hidden", tabId !== "tab1");
    els.bottomTab2.classList.toggle("hidden", tabId !== "tab2");
    if (tabId === "tab1") clearTab2(); else clearTab1();
  }

  function ensureMap() {
    if (map) return;
    map = new google.maps.Map(document.getElementById("map"), { zoom: 15, center: { lat: 0, lng: 0 }, fullscreenControl: false, streetViewControl: false, mapTypeControl: false, zoomControl: true });
    directionsService = new google.maps.DirectionsService();
    map.addListener("click", (e) => {
      if (activeTab !== "tab1") return;
      if (tab1Building || !e?.latLng) return;
      handleTab1MapClick(e.latLng);
    });
  }

  function loadGoogleMapsScript() {
    return new Promise((resolve, reject) => {
      if (!GOOGLE_MAPS_API_KEY) {
        reject(new Error("Вкажіть реальний GOOGLE_MAPS_API_KEY в index.html."));
        return;
      }
      if (window.google?.maps) { resolve(); return; }
      const existing = document.querySelector('script[data-stepmap="gmaps"]');
      if (existing) {
        existing.addEventListener("load", () => resolve());
        existing.addEventListener("error", reject);
        return;
      }
      window.initStepMap = () => resolve();
      const s = document.createElement("script");
      s.dataset.stepmap = "gmaps";
      s.async = true;
      s.defer = true;
      s.src = "https://maps.googleapis.com/maps/api/js?key=" + encodeURIComponent(GOOGLE_MAPS_API_KEY) + "&v=weekly&callback=initStepMap";
      document.head.appendChild(s);
    });
  }

  function getCurrentLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error("Geolocation API не підтримується.")); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        (err) => reject(err),
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 2500 }
      );
    });
  }

  function sumDistanceMetersFromDirections(result) {
    let meters = 0;
    const routes = result?.routes || [];
    for (const r of routes) {
      for (const leg of (r?.legs || [])) {
        if (leg?.distance && typeof leg.distance.value === "number") meters += leg.distance.value;
      }
    }
    return meters;
  }

  function buildPolylineFromDirections(result, color) {
    const route = result?.routes?.[0];
    const path = route?.overview_path;
    if (!path?.length) return null;
    return new google.maps.Polyline({ path, strokeColor: color, strokeOpacity: 0.95, strokeWeight: 6, map });
  }

  function addMarker(latLng, labelText) {
    return new google.maps.Marker({
      position: latLng,
      map,
      label: labelText ? { text: labelText, fontWeight: "900" } : undefined,
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 6, fillColor: "#60a5fa", fillOpacity: 0.95, strokeColor: "#0b1220", strokeWeight: 2 },
    });
  }

  function updateTab1UI() {
    const targetSteps = getTargetSteps();
    const stepMeters = getStepMeters();
    const totalMeters = tab1Segments.reduce((a, s) => a + (s.distanceMeters || 0), 0);
    const totalSteps = stepMeters ? Math.max(0, Math.round(totalMeters / stepMeters)) : null;

    if (tab1Points.length === 0) {
      els.tab1CounterMain.textContent = "Натискай на карту";
      els.tab1CounterSub.textContent = "Перший клік — старт, наступні — точки маршруту.";
      els.tab1ProgressFill.style.width = "0%";
      els.tab1ProgressLabel.textContent = `0 / ${fmtUk.format(targetSteps)}`;
      els.undoBtn.disabled = true;
      els.clearTab1Btn.disabled = true;
      return;
    }

    if (!stepMeters) {
      els.tab1CounterMain.textContent = "≈ — кроків";
      els.tab1CounterSub.textContent = "Вкажіть зріст у ⚙️, щоб рахувати кроки.";
      els.tab1ProgressFill.style.width = "0%";
      els.tab1ProgressLabel.textContent = `0 / ${fmtUk.format(targetSteps)}`;
      els.undoBtn.disabled = false;
      els.clearTab1Btn.disabled = false;
      return;
    }

    els.tab1CounterMain.textContent = `≈ ${fmtUk.format(totalSteps)} кроків (${fmtUk.format(Math.round(totalMeters))} м)`;
    els.tab1CounterSub.textContent = "Walking маршрут по реальних вулицях (Directions API).";

    const ratio = targetSteps > 0 ? Math.min(1, totalSteps / targetSteps) : 0;
    els.tab1ProgressFill.style.width = `${Math.round(ratio * 100)}%`;
    els.tab1ProgressLabel.textContent = `${fmtUk.format(totalSteps)} / ${fmtUk.format(targetSteps)}`;

    els.undoBtn.disabled = false;
    els.clearTab1Btn.disabled = false;
  }

  async function handleTab1MapClick(latLng) {
    tab1Building = true;
    try {
      const idx = tab1Points.length;
      tab1Points.push(latLng);
      tab1Markers.push(addMarker(latLng, String(idx + 1)));

      if (tab1Points.length >= 2) {
        setStatus("Будую сегмент…");
        const from = tab1Points[tab1Points.length - 2];
        const to = tab1Points[tab1Points.length - 1];
        const res = await new Promise((resolve, reject) => {
          directionsService.route({ origin: from, destination: to, travelMode: google.maps.TravelMode.WALKING }, (r, status) => {
            if (status === "OK" && r) resolve(r);
            else reject(new Error("Directions API (сегмент): " + status));
          });
        });
        tab1Segments.push({ polyline: buildPolylineFromDirections(res, "#60a5fa"), distanceMeters: sumDistanceMetersFromDirections(res) });
      }

      setStatus("");
      updateTab1UI();
    } catch (e) {
      setStatus(e?.message ? e.message : String(e));
      updateTab1UI();
    } finally {
      tab1Building = false;
    }
  }

  // Tab1 buttons
  els.undoBtn.addEventListener("click", () => {
    if (tab1Building || tab1Points.length === 0) return;
    const lastMarker = tab1Markers.pop();
    if (lastMarker) lastMarker.setMap(null);
    tab1Points.pop();
    if (tab1Segments.length > tab1Points.length - 1) {
      const lastSeg = tab1Segments.pop();
      if (lastSeg?.polyline) lastSeg.polyline.setMap(null);
    }
    updateTab1UI();
  });

  els.clearTab1Btn.addEventListener("click", () => {
    if (tab1Building) return;
    clearTab1();
  });

  // Tab2 remaining + build
  function updateTab2RemainingUI() {
    const stepMeters = getStepMeters();
    const targetSteps = getTargetSteps();
    const raw = els.stepsToday.value;
    const stepsToday = raw === "" ? null : Number(raw);

    if (stepsToday == null || !Number.isFinite(stepsToday) || stepsToday < 0) {
      els.tab2Remaining.textContent = "Лишилось: —";
      els.buildBtn.disabled = true;
      return;
    }

    const remainingSteps = Math.max(0, targetSteps - stepsToday);

    if (!stepMeters) {
      els.tab2Remaining.textContent = `Лишилось: ${fmtUk.format(remainingSteps)} кроків (вкажіть зріст)`;
      els.buildBtn.disabled = remainingSteps <= 0;
      return;
    }

    const remainingMeters = remainingSteps * stepMeters;
    els.tab2Remaining.textContent = `Лишилось: ${fmtUk.format(remainingSteps)} кроків = ${fmtUk.format(Math.round(remainingMeters))} метрів`;
    els.buildBtn.disabled = remainingSteps <= 0;
  }

  els.stepsToday.addEventListener("input", () => updateTab2RemainingUI());

  // Tab2 build round trip
  function toRadians(d) { return (d * Math.PI) / 180; }
  function toDegrees(r) { return (r * 180) / Math.PI; }
  function computeDestination(start, distanceMeters, bearingDegrees) {
    const R = 6378137;
    const brng = toRadians(bearingDegrees);
    const lat1 = toRadians(start.lat);
    const lon1 = toRadians(start.lng);
    const dByR = distanceMeters / R;
    const lat2 = Math.asin(Math.sin(lat1) * Math.cos(dByR) + Math.cos(lat1) * Math.sin(dByR) * Math.cos(brng));
    const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(dByR) * Math.cos(lat1), Math.cos(dByR) - Math.sin(lat1) * Math.sin(lat2));
    return { lat: toDegrees(lat2), lng: toDegrees(lon2) };
  }

  els.buildBtn.addEventListener("click", async () => {
    if (tab2Building) return;
    tab2Building = true;
    try {
      const stepMeters = getStepMeters();
      if (!stepMeters) throw new Error("Вкажіть зріст у ⚙️.");
      const targetSteps = getTargetSteps();
      const stepsToday = Number(els.stepsToday.value);
      if (!Number.isFinite(stepsToday)) throw new Error("Вкажіть кроки сьогодні.");

      const remainingSteps = Math.max(0, targetSteps - stepsToday);
      if (remainingSteps <= 0) { els.tab2Result.textContent = "Результат: ціль досягнута"; return; }

      if (!startLatLng) startLatLng = await getCurrentLocation();
      else startLatLng = await getCurrentLocation().catch(() => startLatLng);

      ensureMap();
      map.setCenter(startLatLng);
      els.tab2Result.textContent = "Результат: будую…";
      setStatus("Будую маршрут…");

      for (const p of tab2Polylines) p.setMap(null);
      tab2Polylines = [];

      const totalMeters = remainingSteps * stepMeters;
      const outMeters = totalMeters / 2;
      const outPoint = computeDestination(startLatLng, outMeters, 0);

      const bounds = new google.maps.LatLngBounds();

      const outResult = await new Promise((resolve, reject) => {
        directionsService.route({ origin: startLatLng, destination: outPoint, travelMode: google.maps.TravelMode.WALKING }, (r, status) => {
          if (status === "OK" && r) resolve(r);
          else reject(new Error("Directions API (вихід): " + status));
        });
      });
      const outPolyline = buildPolylineFromDirections(outResult, "#60a5fa");
      if (outPolyline) tab2Polylines.push(outPolyline);

      const backResult = await new Promise((resolve, reject) => {
        directionsService.route({ origin: outPoint, destination: startLatLng, travelMode: google.maps.TravelMode.WALKING }, (r, status) => {
          if (status === "OK" && r) resolve(r);
          else reject(new Error("Directions API (назад): " + status));
        });
      });
      const backPolyline = buildPolylineFromDirections(backResult, "#22c55e");
      if (backPolyline) tab2Polylines.push(backPolyline);

      const collectBounds = (res) => {
        const path = res?.routes?.[0]?.overview_path || [];
        for (const p of path) bounds.extend(p);
      };
      collectBounds(outResult); collectBounds(backResult);
      if (typeof bounds.isEmpty === "function" ? !bounds.isEmpty() : true) map.fitBounds(bounds);

      const totalMetersActual = sumDistanceMetersFromDirections(outResult) + sumDistanceMetersFromDirections(backResult);
      const totalStepsActual = Math.max(0, Math.round(totalMetersActual / stepMeters));
      els.tab2Result.textContent = `Результат: ≈ ${fmtUk.format(totalStepsActual)} кроків (${fmtUk.format(Math.round(totalMetersActual))} м)`;
      setStatus("");
    } catch (e) {
      setStatus(e?.message ? e.message : String(e));
      els.tab2Result.textContent = "Результат: не вдалося побудувати маршрут";
    } finally {
      tab2Building = false;
      updateTab2RemainingUI();
      setStatus("");
    }
  });

  els.clearTab2Btn.addEventListener("click", () => {
    if (tab2Building) return;
    clearTab2();
  });

  // Settings drawer
  function setDrawerOpen(open) { els.drawerOverlay.classList.toggle("open", open); }
  els.gearBtn.addEventListener("click", () => setDrawerOpen(true));
  els.closeDrawerBtn.addEventListener("click", () => setDrawerOpen(false));
  els.drawerOverlay.addEventListener("click", (e) => { if (e.target === els.drawerOverlay) setDrawerOpen(false); });

  els.heightCm.addEventListener("input", () => { updateDrawerStepInfo(); updateTab1UI(); updateTab2RemainingUI(); });
  els.heightCm.addEventListener("change", () => { saveSettings(); updateDrawerStepInfo(); updateTab1UI(); updateTab2RemainingUI(); });
  els.targetSteps.addEventListener("change", () => { saveSettings(); updateTab1UI(); updateTab2RemainingUI(); });

  els.tab1Btn.addEventListener("click", () => setActiveTab("tab1"));
  els.tab2Btn.addEventListener("click", () => setActiveTab("tab2"));

  // PWA offline
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
  }

  // Init
  (async function init(){
    loadSettings();
    setActiveTab("tab1");
    updateTab2RemainingUI();
    try {
      setStatus("Завантаження Google Maps…");
      await loadGoogleMapsScript();
      ensureMap();
      try { startLatLng = await getCurrentLocation(); map.setCenter(startLatLng); } catch {}
      setStatus("");
    } catch (e) {
      setStatus(e?.message ? e.message : String(e));
    }
  })();
</script></body></html>
